<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>VideoTrainSimulator</title>
    <style>
        :root { --accent: #00ff00; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; font-family: "Segoe UI", sans-serif; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; position: absolute; top: 0; left: 0; }
        .active { display: flex !important; }

        /* 配置卡片 */
        .config-card { background: #1a1a1a; padding: 30px; border-radius: 12px; border: 1px solid #333; width: 85%; max-width: 580px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .btn { padding: 12px 24px; margin: 8px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.15s; }
        .btn-primary { background: #0078d4; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-outline { background: transparent; border: 1px solid #555; color: #ccc; }
        .btn:hover { transform: scale(1.03); opacity: 0.9; }

        .setting-row { margin: 15px 0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #bbb; }
        input, select { background: #000; color: #0f0; border: 1px solid #444; padding: 6px; text-align: center; border-radius: 4px; outline: none; }

        /* HUD - 实时倒计时 */
        #bench-display { 
            position: absolute; top: 30px; left: 30px; 
            background: rgba(0,0,0,0.85); padding: 15px 25px; 
            border-radius: 4px; border: 1px solid #333; pointer-events: none;
            display: flex; flex-direction: column; gap: 10px;
        }
        .timer-val { font-size: 36px; font-weight: bold; font-family: monospace; line-height: 1; }
        .timer-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        /* 编辑器专用增强 */
        #editor-layout { width: 95%; max-width: 1000px; display: flex; flex-direction: column; gap: 15px; }
        #preview-video { width: 100%; background: #111; border-radius: 8px; border: 1px solid #333; max-height: 55vh; }
        #scrubber { width: 100%; cursor: pointer; height: 12px; accent-color: #0078d4; }
        
        /* 标记计数器样式 */
        .marker-counter { display: flex; gap: 20px; font-weight: bold; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .count-stop { color: #f44; }
        .count-depart { color: #0af; }
        .marker-log { background: #0a0a0a; height: 80px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 12px; border: 1px solid #222; color: #666; text-align: left; }

        /* 游戏视图 */
        #game-container { position: relative; width: 100vw; height: 100vh; }
        video#main-video { width: 100%; height: 100%; object-fit: contain; }
        #hud { position: absolute; bottom: 40px; right: 40px; background: rgba(0,0,0,0.9); padding: 25px; border-left: 6px solid var(--accent); min-width: 260px; text-align: right; }
        .notch-val { font-size: 72px; font-weight: 900; font-family: 'Courier New', monospace; color: var(--accent); line-height: 0.8; }
        #speed-txt { font-size: 26px; font-weight: bold; margin-top: 5px; }
        .rate-info { font-size: 13px; color: #444; margin-top: 6px; font-family: monospace; }
    </style>
</head>
<body>

    <div id="screen-start" class="screen active">
        <div class="config-card">
            <h2 style="letter-spacing:2px; margin-bottom:10px;">VideoTrainSimulator</h2>
            <div id="upload-box">
                <input type="file" id="video-input" accept="video/*" style="display:none;">
                <button type="button" class="btn btn-primary" onclick="document.getElementById('video-input').click()">选择视频文件</button>
            </div>
            
            <div id="file-ready" style="display:none; margin-top:25px; border-top:1px solid #333; padding-top:20px;">
                <div class="setting-row">
                    <label>运行规则选择：</label>
                    <select id="cfg-rule">
                        <option value="reality">现实模拟规则 (仪表同步+直线变速)</option>
                        <option value="dynamic">动力补偿规则 (经典位移追赶)</option>
                    </select>
                </div>
                <div class="setting-row">
                    <label>线路达速速度：</label>
                    <input type="number" id="cfg-line-speed" value="80"> <span>km/h</span>
                </div>
                <div class="setting-row">
                    <label>动力模拟区间 (Window)：</label>
                    <input type="number" id="cfg-v-accel" value="40"> <span>秒</span>
                </div>
                <button type="button" class="btn btn-success" onclick="startSimulator()">启动模拟器</button>
                <button type="button" class="btn btn-outline" onclick="openEditor()">打点编辑器</button>
            </div>
        </div>
    </div>

    <div id="screen-editor" class="screen">
        <div id="editor-layout">
            <div class="marker-counter">
                <div class="count-stop">停车点计数：<span id="cnt-stop">0</span></div>
                <div class="count-depart">发车点计数：<span id="cnt-depart">0</span></div>
            </div>
            <video id="preview-video" preload="auto" playsinline muted></video>
            <input type="range" id="scrubber" value="0" step="0.001">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <div id="edit-time" style="font-size:36px; font-family:monospace; color:#0af;">00:00.000</div>
                <div>
                    <button class="btn btn-primary" style="background:#f44;" onclick="setMark('stop')">标记停车点</button>
                    <button class="btn btn-primary" style="background:#0af;" onclick="setMark('depart')">标记发车点</button>
                </div>
            </div>
            <div class="marker-log" id="marker-log">等待打点数据...</div>
            <div style="text-align:center;">
                <button class="btn btn-success" onclick="closeEditor()">保存并返回</button>
                <button class="btn btn-outline" onclick="exportJSON()">导出 JSON</button>
                <button class="btn btn-outline" onclick="document.getElementById('import-json').click()">导入 JSON</button>
                <input type="file" id="import-json" accept=".json" style="display:none;">
            </div>
        </div>
    </div>

    <div id="game-container" class="screen">
        <div id="bench-display">
            <div class="timer-item" id="hud-stop">
                <div class="timer-label">Distance to Stop</div>
                <div class="timer-val" id="time-to-stop">--:--</div>
            </div>
            <div class="timer-item" id="hud-depart" style="display:none;">
                <div class="timer-label">Door Closing In</div>
                <div class="timer-val" style="color:#ffc107" id="time-to-depart">--:--</div>
            </div>
        </div>
        <video id="main-video" playsinline muted></video>
        <div id="hud">
            <div class="notch-val" id="notch-txt">N</div>
            <div id="speed-txt">0.0 km/h</div>
            <div class="rate-info">MODE: <span id="ui-mode-name">-</span></div>
            <div class="rate-info">ACTUAL RATE: <b id="rate-display">0.00x</b></div>
        </div>
    </div>

<script>
    let markers = { stops: [], departs: [] };
    let currentNotch = 0, logicalV = 0, virtualDist = 0, isDoorOpen = false, activeScreen = 'start';
    let lastTick = performance.now(), compWindow = 40, maxLineSpeed = 80, selectedRule = 'reality';
    let smoothedRate = 0;

    const v = document.getElementById('main-video');
    const pv = document.getElementById('preview-video');
    const scrubber = document.getElementById('scrubber');

    document.getElementById('video-input').onchange = e => {
        const file = e.target.files[0];
        if(!file) return;
        const url = URL.createObjectURL(file);
        v.src = url; pv.src = url;
        v.load(); pv.load();
        v.onloadedmetadata = () => {
            document.getElementById('file-ready').style.display = 'block';
            scrubber.max = v.duration;
        };
    };

    window.addEventListener('keydown', e => {
        if (activeScreen === 'editor') {
            if (e.code === 'Space') { e.preventDefault(); pv.paused ? pv.play() : pv.pause(); }
            if (e.key === 'ArrowLeft') pv.currentTime -= 1;
            if (e.key === 'ArrowRight') pv.currentTime += 1;
        }
        if (activeScreen === 'game') {
            if (!isDoorOpen) {
                if (e.key === 'ArrowUp') { currentNotch = Math.min(5, currentNotch + 1); updateUI(); }
                if (e.key === 'ArrowDown') { currentNotch = Math.max(-5, currentNotch - 1); updateUI(); }
            }
            if (e.key === 'ArrowLeft') toggleDoor();
            if (e.key.toLowerCase() === 's') handleSkip();
        }
    });

    function toggleDoor() {
        if(logicalV < 0.05) {
            isDoorOpen = !isDoorOpen;
            if(isDoorOpen) { currentNotch = 0; v.playbackRate = 1.0; v.play(); v.muted = false; }
            else { v.pause(); logicalV = 0; virtualDist = v.currentTime; }
            updateUI();
        }
    }

    function handleSkip() {
        const cur = v.currentTime;
        const next = markers.departs.find(t => t > cur);
        if (next && (next - cur) > 5) { v.currentTime = next - 5; virtualDist = v.currentTime; }
    }

    // 编辑器核心逻辑
    pv.ontimeupdate = () => { 
        if(activeScreen === 'editor') { 
            document.getElementById('edit-time').innerText = formatTime(pv.currentTime); 
            scrubber.value = pv.currentTime; 
        } 
    };
    scrubber.oninput = () => { pv.currentTime = scrubber.value; };
    
    function openEditor() { 
        activeScreen = 'editor'; 
        switchScreen('screen-editor'); 
        pv.currentTime = 0.1; 
        updateMarkerLog(); // 确保打开时更新一次计数
    }
    
    function closeEditor() { activeScreen = 'start'; switchScreen('screen-start'); pv.pause(); }
    function switchScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    function setMark(type) {
        const t = pv.currentTime;
        type === 'stop' ? markers.stops.push(t) : markers.departs.push(t);
        markers.stops.sort((a,b)=>a-b); markers.departs.sort((a,b)=>a-b);
        updateMarkerLog();
    }

    function updateMarkerLog() {
        document.getElementById('cnt-stop').innerText = markers.stops.length;
        document.getElementById('cnt-depart').innerText = markers.departs.length;
        document.getElementById('marker-log').innerHTML = 
            `STOPS: ${markers.stops.map(t=>t.toFixed(1)).join(", ") || "None"}<br>` +
            `DEPARTS: ${markers.departs.map(t=>t.toFixed(1)).join(", ") || "None"}`;
    }

    function startSimulator() {
        activeScreen = 'game';
        selectedRule = document.getElementById('cfg-rule').value;
        compWindow = parseFloat(document.getElementById('cfg-v-accel').value) || 40;
        maxLineSpeed = parseFloat(document.getElementById('cfg-line-speed').value) || 80;
        document.getElementById('ui-mode-name').innerText = selectedRule === 'reality' ? "现实模拟" : "动力补偿";
        switchScreen('game-container');
        v.currentTime = 0; virtualDist = 0; logicalV = 0; currentNotch = 0; smoothedRate = 0;
        v.play().then(() => v.pause());
        lastTick = performance.now();
        requestAnimationFrame(gameLoop);
    }

    // --- 核心双模引擎 V6.8 ---
    function gameLoop(now) {
        const dt = (now - lastTick) / 1000;
        lastTick = now;

        if(activeScreen === 'game') {
            if(!isDoorOpen) {
                const cur = v.currentTime;
                const nextStop = markers.stops.find(t => t > cur);
                const departList = markers.departs.length > 0 ? markers.departs : [0];
                const lastDepart = [...departList].reverse().find(t => t <= cur);
                
                if (selectedRule === 'reality') {
                    let isSpecialZone = false, mode = "", timeLeft = 0;
                    if (lastDepart !== undefined && (cur - lastDepart) < compWindow) {
                        isSpecialZone = true; mode = "depart"; timeLeft = compWindow - (cur - lastDepart);
                    } else if (nextStop && (nextStop - cur) < compWindow) {
                        isSpecialZone = true; mode = "stop"; timeLeft = nextStop - cur;
                    }

                    if (isSpecialZone) {
                        let targetRate = (mode === "depart") ? (currentNotch > 0 ? currentNotch : 0) : (currentNotch < 0 ? 1.0/Math.abs(currentNotch) : 16.0);
                        let step = (5.0 / 2.5) * dt;

                        if (mode === "depart" && currentNotch <= 0) smoothedRate = Math.max(0.01, smoothedRate - 0.1 * dt);
                        else if (mode === "stop" && currentNotch >= 0) smoothedRate = Math.min(16, smoothedRate + 0.05 * dt);
                        else {
                            if (Math.abs(smoothedRate - targetRate) < step) smoothedRate = targetRate;
                            else smoothedRate += (smoothedRate < targetRate) ? step : -step;
                        }

                        let regTime = Math.min(5, compWindow * 0.2);
                        if (timeLeft < regTime) {
                            let ratio = timeLeft / regTime;
                            smoothedRate = (smoothedRate * ratio) + (1.0 * (1 - ratio));
                        }
                        let progress = (mode === "depart") ? (cur - lastDepart) / compWindow : (nextStop - cur) / compWindow;
                        logicalV = smoothedRate * progress;
                    } else {
                        if(currentNotch > 0) logicalV += currentNotch * 0.05 * dt;
                        else if(currentNotch < 0) logicalV += currentNotch * 0.1 * dt;
                        logicalV = Math.max(0, Math.min(5.0, logicalV));
                        smoothedRate = logicalV + ((virtualDist - cur) * 0.5);
                    }
                    virtualDist = cur;
                } else {
                    if(currentNotch > 0) logicalV += currentNotch * 0.05 * dt;
                    else if(currentNotch < 0) logicalV += currentNotch * 0.1 * dt;
                    logicalV = Math.max(0, Math.min(5.0, logicalV));
                    virtualDist += logicalV * dt;
                    smoothedRate = logicalV + ((virtualDist - cur) * (10/compWindow));
                }

                if(currentNotch !== 0 || logicalV > 0.01) {
                    v.playbackRate = Math.min(Math.max(smoothedRate, 0.0625), 16);
                    if(v.paused) v.play().catch(()=>{});
                } else {
                    v.pause(); virtualDist = v.currentTime; smoothedRate = 0;
                }
            }
            document.getElementById('speed-txt').innerText = (logicalV * maxLineSpeed).toFixed(1) + " km/h";
            document.getElementById('rate-display').innerText = v.paused ? "0.00x" : v.playbackRate.toFixed(2) + "x";
            updateHUDTimers();
        }
        requestAnimationFrame(gameLoop);
    }

    function updateHUDTimers() {
        const cur = v.currentTime;
        const nextStop = markers.stops.find(t => t > cur);
        const nextDepart = markers.departs.find(t => t > cur);
        
        document.getElementById('time-to-stop').innerText = nextStop ? (nextStop - cur).toFixed(1) + "s" : "--:--";
        document.getElementById('hud-stop').style.display = isDoorOpen ? "none" : "flex";

        const departBox = document.getElementById('hud-depart');
        if (isDoorOpen && nextDepart) {
            departBox.style.display = "flex";
            document.getElementById('time-to-depart').innerText = (nextDepart - cur).toFixed(1) + "s";
        } else {
            departBox.style.display = "none";
        }
    }

    function updateUI() {
        const nt = document.getElementById('notch-txt');
        const label = currentNotch > 0 ? "P" + currentNotch : (currentNotch < 0 ? "B" + Math.abs(currentNotch) : "N");
        nt.innerText = isDoorOpen ? "OPEN" : label;
        nt.style.color = isDoorOpen ? "#ffc107" : (currentNotch > 0 ? "#0af" : (currentNotch < 0 ? "#f44" : "#0f0"));
    }

    function exportJSON() { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(markers)], {type:"application/json"})); a.download = "sim.json"; a.click(); }
    document.getElementById('import-json').onchange = e => { const r = new FileReader(); r.onload = ev => { markers = JSON.parse(ev.target.result); updateMarkerLog(); alert("数据载入成功"); }; r.readAsText(e.target.files[0]); };
    function formatTime(s) { const m = Math.floor(s / 60); const ss = (s % 60).toFixed(3); return (m < 10 ? "0"+m : m) + ":" + (ss < 10 ? "0"+ss : ss); }
</script>
</body>
</html>
