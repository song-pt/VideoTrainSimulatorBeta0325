<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>VideoTrainSimulator - Speed & Timer Edition</title>
    <style>
        :root { --accent: #00ff00; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; font-family: "Segoe UI", sans-serif; overflow: hidden; }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; }
        .active { display: flex; }

        /* UI Panel */
        .config-card { background: #1a1a1a; padding: 30px; border-radius: 12px; border: 1px solid #333; width: 85%; max-width: 540px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .btn { padding: 12px 24px; margin: 8px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.15s; }
        .btn-primary { background: #0078d4; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-outline { background: transparent; border: 1px solid #555; color: #ccc; }
        .btn:hover { transform: scale(1.03); opacity: 0.9; }

        /* 配置项 */
        .setting-row { margin: 15px 0; display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #bbb; }
        .setting-row input { width: 70px; background: #000; color: #0f0; border: 1px solid #444; padding: 5px; text-align: center; border-radius: 4px; }

        /* Editor */
        #editor-layout { width: 95%; max-width: 1000px; }
        #preview-video { width: 100%; background: #000; border-radius: 8px; max-height: 55vh; }
        #scrubber { width: 100%; margin: 20px 0; cursor: pointer; height: 12px; accent-color: #0078d4; }
        .marker-log { background: #0a0a0a; height: 100px; overflow-y: auto; padding: 10px; font-family: monospace; font-size: 13px; border: 1px solid #222; color: #0f0; margin-top: 10px; text-align: left; }

        /* Game HUD */
        #game-container { position: relative; width: 100vw; height: 100vh; }
        video#main-video { width: 100%; height: 100%; object-fit: contain; }
        #hud { position: absolute; bottom: 40px; right: 40px; background: rgba(0,0,0,0.9); padding: 25px; border-left: 6px solid var(--accent); min-width: 260px; text-align: right; pointer-events: none; }
        .notch-val { font-size: 72px; font-weight: 900; font-family: 'Courier New', monospace; color: var(--accent); line-height: 0.8; }
        
        #bench-display { position: absolute; top: 40px; left: 40px; background: rgba(0,0,0,0.85); padding: 20px; border-radius: 4px; border: 1px solid #333; pointer-events: none; }
        .timer-box { margin-bottom: 15px; }
        .timer-val { font-size: 32px; font-weight: bold; font-family: monospace; }
        .timer-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        #load-msg { margin-top: 15px; color: #ffc107; font-weight: bold; }
    </style>
</head>
<body>

    <div id="screen-start" class="screen active">
        <div class="config-card">
            <h2 style="letter-spacing:2px; margin-bottom:10px;">VideoTrainSimulator</h2>
            <div id="upload-box">
                <input type="file" id="video-input" accept="video/*" style="display:none;">
                <button type="button" class="btn btn-primary" onclick="document.getElementById('video-input').click()">选择视频文件</button>
                <div id="load-msg">等待视频上传...</div>
            </div>
            
            <div id="file-ready" style="display:none; margin-top:25px; border-top:1px solid #333; padding-top:20px;">
                <div class="setting-row">
                    <label>线路达速 (1.0x时速)：</label>
                    <input type="number" id="cfg-line-speed" value="80"> <span style="margin-left:5px;">km/h</span>
                </div>
                <div class="setting-row">
                    <label>动力补偿窗口：</label>
                    <input type="number" id="cfg-v-accel" value="15"> <span style="margin-left:5px;">秒</span>
                </div>
                <button type="button" class="btn btn-success" onclick="startSimulator()">进入驾驶室</button>
                <button type="button" class="btn btn-outline" onclick="openEditor()">打点微调编辑器</button>
            </div>
        </div>
    </div>

    <div id="screen-editor" class="screen">
        <div id="editor-layout">
            <video id="preview-video" preload="auto" muted></video>
            <input type="range" id="scrubber" value="0" step="0.001">
            <div style="display:flex; justify-content: space-between; align-items: flex-end;">
                <div>
                    <div id="edit-time" style="font-size:36px; font-family:monospace; color:#0af;">00:00.000</div>
                    <div style="font-size:12px; color:#666;">空格: 播/暂 | ←/→: 增减1秒</div>
                </div>
                <div>
                    <button type="button" class="btn btn-primary" onclick="setMark('stop')">标记停车点</button>
                    <button type="button" class="btn btn-primary" onclick="setMark('depart')">标记发车点</button>
                </div>
            </div>
            <div class="marker-log" id="marker-log"></div>
            <div style="margin-top:20px;">
                <button type="button" class="btn btn-success" onclick="closeEditor()">保存并返回</button>
                <button type="button" class="btn btn-outline" onclick="exportJSON()">导出 JSON</button>
                <button type="button" class="btn btn-outline" onclick="document.getElementById('import-json').click()">导入 JSON</button>
                <input type="file" id="import-json" accept=".json" style="display:none;">
            </div>
        </div>
    </div>

    <div id="game-container" class="screen">
        <div id="bench-display">
            <div class="timer-box" id="box-stop">
                <div class="timer-label">Distance to Stop</div>
                <div class="timer-val" id="time-to-stop">--:--</div>
            </div>
            <div class="timer-box" id="box-depart" style="opacity:0.3;">
                <div class="timer-label">Time to Depart</div>
                <div class="timer-val" id="time-to-depart">--:--</div>
            </div>
        </div>
        <video id="main-video" playsinline muted></video>
        <div id="hud">
            <div class="notch-val" id="notch-txt">N</div>
            <div id="speed-txt" style="font-size:24px; font-weight:bold; margin-top:5px;">0.0 km/h</div>
            <div id="debug-info" style="font-size:10px; color:#444; margin-top:15px; font-family:monospace; border-top:1px solid #222; padding-top:5px;">READY</div>
        </div>
    </div>

<script>
    let markers = { stops: [], departs: [] };
    let currentNotch = 0, logicalRate = 0, isDoorOpen = false, activeScreen = 'start';
    let lastTick = performance.now(), compWindow = 15, maxLineSpeed = 80;

    const v = document.getElementById('main-video');
    const pv = document.getElementById('preview-video');
    const scrubber = document.getElementById('scrubber');
    const loadMsg = document.getElementById('load-msg');

    document.getElementById('video-input').onchange = e => {
        const file = e.target.files[0];
        if(!file) return;
        loadMsg.innerText = "加载中...";
        const url = URL.createObjectURL(file);
        v.src = url; pv.src = url;
        v.onloadedmetadata = () => {
            loadMsg.innerText = "视频已就绪";
            document.getElementById('file-ready').style.display = 'block';
            scrubber.max = v.duration;
            updateMarkerLog();
        };
    };

    window.addEventListener('keydown', e => {
        if (activeScreen === 'editor') {
            if (e.code === 'Space') { e.preventDefault(); pv.paused ? pv.play() : pv.pause(); }
            if (e.key === 'ArrowLeft') { e.preventDefault(); pv.currentTime -= 1; scrubber.value = pv.currentTime; }
            if (e.key === 'ArrowRight') { e.preventDefault(); pv.currentTime += 1; scrubber.value = pv.currentTime; }
        }
        if (activeScreen === 'game') {
            v.muted = false;
            if (isDoorOpen && e.key !== 'ArrowLeft') return;
            if (e.key === 'ArrowUp') { if(currentNotch < 5) currentNotch++; updateUI(); }
            if (e.key === 'ArrowDown') { if(currentNotch > -5) currentNotch--; updateUI(); }
            if (e.key === 'ArrowLeft') toggleDoor();
        }
    });

    pv.ontimeupdate = () => { if(activeScreen === 'editor') { document.getElementById('edit-time').innerText = formatTime(pv.currentTime); if(!pv.paused) scrubber.value = pv.currentTime; } };
    scrubber.oninput = () => { pv.currentTime = scrubber.value; document.getElementById('edit-time').innerText = formatTime(pv.currentTime); };

    function openEditor() { activeScreen = 'editor'; switchScreen('screen-editor'); }
    function closeEditor() { activeScreen = 'start'; switchScreen('screen-start'); }
    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function setMark(type) {
        const t = pv.currentTime;
        type === 'stop' ? markers.stops.push(t) : markers.departs.push(t);
        markers.stops.sort((a,b)=>a-b); markers.departs.sort((a,b)=>a-b);
        updateMarkerLog();
    }
    function updateMarkerLog() {
        document.getElementById('marker-log').innerHTML = `<b>停车点:</b> ${markers.stops.map(t=>t.toFixed(1)).join(", ") || "无"}<br><b>发车点:</b> ${markers.departs.map(t=>t.toFixed(1)).join(", ") || "无"}`;
    }

    function startSimulator() {
        activeScreen = 'game';
        compWindow = parseFloat(document.getElementById('cfg-v-accel').value) || 15;
        maxLineSpeed = parseFloat(document.getElementById('cfg-line-speed').value) || 80;
        switchScreen('game-container');
        v.currentTime = 0;
        v.play().then(() => v.pause());
        requestAnimationFrame(gameLoop);
    }

    function toggleDoor() {
        if(logicalRate < 0.05) {
            isDoorOpen = !isDoorOpen;
            if(isDoorOpen) {
                currentNotch = 0; v.playbackRate = 1.0; v.play();
                document.getElementById('box-depart').style.opacity = "1";
            } else {
                v.pause(); logicalRate = 0;
                document.getElementById('box-depart').style.opacity = "0.3";
            }
            updateUI();
        }
    }

    // --- 核心循环重构 ---
    function gameLoop(now) {
        const dt = (now - lastTick) / 1000;
        lastTick = now;

        if(activeScreen === 'game') {
            // A. 物理与视频控制 (仅在关门时运行)
            if(!isDoorOpen) {
                const accel = currentNotch * 0.1;
                const brake = currentNotch * 0.28;
                if(currentNotch > 0) logicalRate += accel * dt;
                else if(currentNotch < 0) logicalRate += brake * dt;
                
                logicalRate = Math.max(0, Math.min(5.0, logicalRate));
                if(logicalRate < 0.001) logicalRate = 0;

                // 动力补偿逻辑
                let videoRefSpeed = 1.0;
                const cur = v.currentTime;
                const nextStop = markers.stops.find(t => t > cur);
                const lastDepart = [...markers.departs].reverse().find(t => t <= cur);

                if (nextStop && (nextStop - cur) < compWindow) {
                    videoRefSpeed = Math.max((nextStop - cur) / compWindow, 0.04);
                } else if (lastDepart !== undefined && (cur - lastDepart) < compWindow) {
                    videoRefSpeed = Math.max((cur - lastDepart) / compWindow, 0.04);
                } else if (cur < 5 && markers.departs.length === 0) {
                    videoRefSpeed = Math.max(cur / 5, 0.1);
                }

                let finalRate = logicalRate / videoRefSpeed;
                if(logicalRate > 0) {
                    v.playbackRate = Math.min(Math.max(finalRate, 0.0625), 16);
                    if(v.paused) v.play().catch(()=>{});
                } else {
                    if(!v.paused) v.pause();
                }
            }

            // B. 界面刷新 (开门/关门均持续运行)
            const displaySpeed = (logicalRate * maxLineSpeed).toFixed(1);
            document.getElementById('speed-txt').innerText = displaySpeed + " km/h";
            document.getElementById('debug-info').innerText = `U:${logicalRate.toFixed(2)} | V-REF:${(1.0).toFixed(2)} | PB:${v.playbackRate.toFixed(2)}`;
            
            updateTimers(); // 关键：倒计时函数移到这里，实现实时刷新
        }
        requestAnimationFrame(gameLoop);
    }

    function updateUI() {
        const nt = document.getElementById('notch-txt');
        if(isDoorOpen) { nt.innerText = "OPEN"; nt.style.color = "#ffc107"; return; }
        const label = currentNotch > 0 ? "P" + currentNotch : (currentNotch < 0 ? "B" + Math.abs(currentNotch) : "N");
        const color = currentNotch > 0 ? "#0af" : (currentNotch < 0 ? "#f44" : "#0f0");
        nt.innerText = label; nt.style.color = color;
        document.body.style.setProperty('--accent', color);
    }

    function updateTimers() {
        const cur = v.currentTime;
        const nextStop = markers.stops.find(t => t > cur);
        const nextDepart = markers.departs.find(t => t > cur);
        
        // 停车对标倒计时
        if(nextStop && !isDoorOpen) {
            document.getElementById('time-to-stop').innerText = (nextStop - cur).toFixed(1) + "s";
            document.getElementById('box-stop').style.opacity = "1";
        } else {
            document.getElementById('time-to-stop').innerText = "--:--";
            document.getElementById('box-stop').style.opacity = "0.3";
        }

        // 发车对标倒计时 (开门状态下实时刷新)
        if(nextDepart && isDoorOpen) {
            document.getElementById('time-to-depart').innerText = (nextDepart - cur).toFixed(1) + "s";
            document.getElementById('box-depart').style.opacity = "1";
        } else {
            document.getElementById('time-to-depart').innerText = "--:--";
            document.getElementById('box-depart').style.opacity = "0.3";
        }
    }

    function exportJSON() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(markers)], {type:"application/json"}));
        a.download = "sim_data.json";
        a.click();
    }
    document.getElementById('import-json').onchange = e => {
        const r = new FileReader();
        r.onload = ev => { markers = JSON.parse(ev.target.result); updateMarkerLog(); alert("对标导入成功"); };
        r.readAsText(e.target.files[0]);
    };

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const ss = (s % 60).toFixed(3);
        return (m < 10 ? "0"+m : m) + ":" + (ss < 10 ? "0"+ss : ss);
    }
</script>
</body>
</html>
